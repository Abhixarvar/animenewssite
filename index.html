<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimePulse - Latest News & Trailers</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">Anime<span>Pulse</span></div>
        <nav>
            <a href="#catalog">Catalog</a>
            <a href="#watch">Watch</a>
            <a href="#trailers">Trailers</a>
            <a href="#news">News</a>
            <a href="#bookmarks" style="color: var(--accent-purple);">Bookmarks <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" style="vertical-align: middle; margin-top:-2px;"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg></a>
        </nav>
    </header>

    <main>
        <section class="top-banner" style="margin-top: 70px;">
            <img src="banner.png" alt="Anime Banner" style="width: 100%; max-height: 50vh; object-fit: cover; display: block; box-shadow: 0 4px 20px rgba(0,0,0,0.5);">
        </section>

        <div class="content-wrapper">
            <section id="catalog" class="section-trailers" style="margin-bottom: 5rem;">
                <div class="section-header">
                    <h2>Series Catalog</h2>
                    <div class="accent-line"></div>
                </div>
                <div id="catalog-grid" class="trailers-grid" style="grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));">
                    <!-- Dynamic catalog items will go here -->
                </div>
            </section>

            <section id="featured-trailer" class="section-featured-trailer" style="margin-bottom: 5rem;">
                <div class="section-header">
                    <h2 id="featured-trailer-title">Loading Latest Trailer...</h2>
                    <div class="accent-line"></div>
                </div>
                <div class="featured-video-container" style="border-radius: 16px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.6); aspect-ratio: 16/9; background: #000;">
                    <iframe id="featured-youtube-player" width="100%" height="100%" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
                </div>
            </section>

            <section id="watch" class="section-trailers" style="margin-bottom: 5rem;">
                <div class="section-header">
                    <h2>Watch Free (Muse Asia)</h2>
                    <div class="accent-line"></div>
                </div>
                <div id="watch-grid" class="trailers-grid">
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                </div>
            </section>

            <section id="bookmarks" class="section-trailers" style="margin-bottom: 5rem;">
                <div class="section-header">
                    <h2>My Bookmarks</h2>
                    <div class="accent-line"></div>
                </div>
                <div id="bookmarks-grid" class="trailers-grid" style="min-height: 100px;">
                    <p id="empty-bookmarks" style="grid-column: 1 / -1; color: var(--text-muted);">You haven't bookmarked any videos yet.</p>
                </div>
            </section>

            <section id="trailers" class="section-trailers">
                <div class="section-header">
                    <h2>Latest Trailers</h2>
                    <div class="accent-line"></div>
                </div>
                <div id="trailers-grid" class="trailers-grid">
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                </div>
            </section>

            <section id="news" class="section-news">
                <div class="section-header">
                    <h2>Latest News</h2>
                    <div class="accent-line"></div>
                </div>
                <div id="news-grid" class="news-grid">
                    <div class="skeleton-news"></div>
                    <div class="skeleton-news"></div>
                    <div class="skeleton-news"></div>
                </div>
            </section>
        </div>
    </main>

    <!-- Series Detail Modal -->
    <div id="series-modal" class="modal">
        <div class="series-modal-content">
            <span class="close-series-btn close-btn">&times;</span>
            <div class="series-header">
                <img id="series-cover" src="" alt="Series Cover">
                <div class="series-info-text">
                    <h2 id="series-title-text">Series Title</h2>
                    <p id="series-desc-text">Description</p>
                </div>
            </div>
            <div class="series-body">
                <div class="season-selector" id="season-selector">
                    <!-- Season tabs go here -->
                </div>
                <div id="episodes-list" class="episodes-list">
                    <!-- Episodes list goes here -->
                </div>
            </div>
        </div>
    </div>

    <!-- YouTube Video Modal -->
    <div id="video-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div class="video-container">
                <iframe id="youtube-player" width="100%" height="100%" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 AnimePulse. Data provided by Jikan & Anime News Network.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
